<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troubleshooting Decision Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --surface2: #161e2c;
    --border: #1e2d42;
    --accent: #00d4aa;
    --accent2: #0084ff;
    --warn: #ffb800;
    --text: #c8d8e8;
    --muted: #5a7a99;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header { margin-bottom: 48px; }

  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* home screen grid */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }

  .cat-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cat-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
    color: #fff;
  }

  .cat-icon { font-size: 18px; flex-shrink: 0; }

  .home-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* breadcrumb */
  .trail {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 28px;
    min-height: 28px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .trail-item { color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .trail-item::after { content: '›'; color: var(--border); }
  .trail-item:last-child { color: var(--accent); }
  .trail-item:last-child::after { display: none; }

  /* question + resolution cards share a lot */
  .card, .resolution {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* colored top bar */
  .card::before,
  .resolution.success::before,
  .resolution.escalate::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .resolution.success::before { background: var(--accent); }
  .resolution.escalate::before { background: var(--warn); }

  .step-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .question {
    font-size: clamp(17px, 3vw, 22px);
    font-weight: 600;
    color: #fff;
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .detail {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
    font-weight: 300;
  }

  .answers { display: flex; flex-direction: column; gap: 10px; }

  .ans-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ans-btn:hover {
    border-color: var(--accent2);
    background: rgba(0, 132, 255, 0.08);
    color: #fff;
    transform: translateX(4px);
  }

  .ans-arrow {
    font-size: 16px;
    opacity: 0.4;
    transition: opacity 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .ans-btn:hover .ans-arrow { opacity: 1; transform: translateX(3px); }

  /* resolution badges */
  .res-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    margin-bottom: 18px;
  }

  .res-badge.fix {
    background: rgba(0, 212, 170, 0.12);
    color: var(--accent);
    border: 1px solid rgba(0, 212, 170, 0.25);
  }
  .res-badge.esc {
    background: rgba(255, 184, 0, 0.12);
    color: var(--warn);
    border: 1px solid rgba(255, 184, 0, 0.25);
  }

  .res-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 16px; }

  .steps-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .steps-list li {
    display: flex;
    gap: 12px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    font-weight: 300;
  }

  .step-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(0, 212, 170, 0.1);
    border: 1px solid rgba(0, 212, 170, 0.2);
    border-radius: 3px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .cmd-block {
    background: #060a10;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .cmd-block .cmd-line::before { content: '> '; color: var(--muted); }

  /* bottom nav buttons */
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    border: 1px solid;
  }

  .ctrl-btn.restart,
  .ctrl-btn.back {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .ctrl-btn.restart:hover { border-color: var(--muted); color: var(--text); }
  .ctrl-btn.back:hover { border-color: var(--accent2); color: var(--accent2); }

  .ctrl-btn.ticket {
    background: rgba(0, 212, 170, 0.1);
    border-color: rgba(0, 212, 170, 0.4);
    color: var(--accent);
    margin-left: auto;
  }
  .ctrl-btn.ticket:hover {
    background: rgba(0, 212, 170, 0.18);
    border-color: var(--accent);
    color: #fff;
  }

  /* ticket modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 9, 14, 0.88);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.18s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideIn 0.22s ease;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px 10px 0 0;
  }

  .modal-header {
    padding: 28px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 22px;
  }

  .modal-title-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .modal-title { font-size: 20px; font-weight: 700; color: #fff; }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .modal-close:hover { border-color: #ff4757; color: #ff4757; }

  .modal-body { padding: 0 28px 28px; }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--accent2); }

  .field textarea { resize: vertical; min-height: 90px; line-height: 1.5; font-weight: 300; }
  .field select option { background: var(--surface2); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .modal-footer { display: flex; gap: 10px; padding-top: 8px; }

  .submit-btn {
    flex: 1;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: #0a0e14;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { background: #00f0c0; }

  .cancel-btn {
    padding: 12px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cancel-btn:hover { border-color: var(--muted); color: var(--text); }

  .ticket-success { text-align: center; padding: 16px 0 8px; }
  .ticket-icon { font-size: 40px; margin-bottom: 14px; }
  .ticket-id { font-family: var(--mono); font-size: 22px; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; }
  .ticket-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; font-weight: 300; line-height: 1.6; }

  .ticket-summary-box {
    background: #060a10;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: left;
    line-height: 1.9;
    margin-bottom: 20px;
  }
  .ticket-summary-box span { color: var(--text); }

</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-tag">// Help Tool</div>
    <h1>Troubleshooting <span>Decision Tree</span></h1>
    <p class="subtitle">Step-by-step guided diagnostics for common support issues</p>
  </header>
  <div id="app"></div>
</div>

<!-- ticket modal -->
<div id="ticket-modal" class="modal-overlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title-tag">// New Ticket</div>
        <div class="modal-title">Submit a Support Ticket</div>
      </div>
      <button class="modal-close" onclick="closeTicketModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>

// shorthand for getElementById
const el = id => document.getElementById(id);

const trees = {
  internet: {
    label: "🌐 No Internet",
    start: "q1",
    nodes: {
      q1: {
        q: "Can the user ping 127.0.0.1 (localhost)?",
        detail: "Open CMD → type 'ping 127.0.0.1'. This tests if the network stack is functioning.",
        answers: [
          { text: "Yes — ping succeeds", next: "q2" },
          { text: "No — request timed out", next: "r_reinstall_stack" }
        ]
      },
      q2: {
        q: "Is the network adapter enabled and showing in Device Manager?",
        detail: "Check Control Panel → Network & Sharing Center, or Device Manager → Network Adapters.",
        answers: [
          { text: "Yes, adapter is enabled", next: "q3" },
          { text: "No, adapter is disabled or missing", next: "r_enable_adapter" }
        ]
      },
      q3: {
        q: "Does the user have a valid IP address? (not 169.x.x.x)",
        detail: "Run 'ipconfig' in CMD. A 169.254.x.x address means DHCP failed.",
        answers: [
          { text: "Yes — valid IP (e.g. 192.168.x.x)", next: "q4" },
          { text: "No — showing 169.254.x.x (APIPA)", next: "r_dhcp" }
        ]
      },
      q4: {
        q: "Can the user ping the default gateway?",
        detail: "Find the gateway via 'ipconfig', then ping it. Example: ping 192.168.1.1",
        answers: [
          { text: "Yes — gateway responds", next: "q5" },
          { text: "No — gateway unreachable", next: "r_check_router" }
        ]
      },
      q5: {
        q: "Can the user ping an external IP? (e.g. 8.8.8.8)",
        detail: "Pinging Google's DNS by IP bypasses DNS resolution to isolate the problem.",
        answers: [
          { text: "Yes — external IP responds", next: "r_dns" },
          { text: "No — external ping fails", next: "r_isp" }
        ]
      },
      r_reinstall_stack: {
        type: "fix",
        title: "Reinstall TCP/IP Stack",
        steps: [
          "Open CMD as Administrator",
          "Run: netsh int ip reset",
          "Run: netsh winsock reset",
          "Restart the computer",
          "Test connectivity again"
        ],
        cmds: ["netsh int ip reset", "netsh winsock reset"]
      },
      r_enable_adapter: {
        type: "fix",
        title: "Enable / Reinstall Network Adapter",
        steps: [
          "Open Device Manager (devmgmt.msc)",
          "Expand Network Adapters",
          "Right-click the adapter → Enable (if disabled)",
          "If missing or has error: right-click → Update driver",
          "If still failing: uninstall and reinstall driver from manufacturer site",
          "Restart and recheck"
        ],
        cmds: ["devmgmt.msc"]
      },
      r_dhcp: {
        type: "fix",
        title: "Fix DHCP / IP Address Issue",
        steps: [
          "Open CMD as Administrator",
          "Run: ipconfig /release then ipconfig /renew",
          "If that fails, check that DHCP service is running (services.msc)",
          "Verify the router/DHCP server is operational",
          "As a test, set a static IP manually and retest"
        ],
        cmds: ["ipconfig /release", "ipconfig /renew", "services.msc"]
      },
      r_check_router: {
        type: "escalate",
        title: "Layer 2 / Router Issue",
        steps: [
          "Check all physical cable connections (PC → switch → router)",
          "Try a different Ethernet port on the switch",
          "Power cycle the router and switch (wait 30 sec)",
          "Check if other devices on the same network have internet",
          "If isolated to one port/switch: escalate to network team"
        ]
      },
      r_dns: {
        type: "fix",
        title: "DNS Resolution Issue",
        steps: [
          "Open CMD and run: ipconfig /flushdns",
          "Try changing DNS to 8.8.8.8 / 8.8.4.4 (Google DNS)",
          "Network Settings → Adapter Properties → IPv4 → set DNS manually",
          "Retry browsing. If resolved, DNS server may be faulty",
          "Report the DNS issue to the network team"
        ],
        cmds: ["ipconfig /flushdns", "nslookup google.com"]
      },
      r_isp: {
        type: "escalate",
        title: "ISP / WAN Outage",
        steps: [
          "Check ISP status page or call ISP support line",
          "Verify WAN light on router is active",
          "Try rebooting the modem (not just the router)",
          "Check if the outage affects the whole building or just one user",
          "Log ticket and escalate to network team if building-wide"
        ]
      }
    }
  },

  slow: {
    label: "🐌 Slow Computer",
    start: "q1",
    nodes: {
      q1: {
        q: "Is the computer slow immediately after startup, or only after some time?",
        detail: "This helps distinguish between startup resource issues and memory/thermal problems.",
        answers: [
          { text: "Slow right after boot", next: "q2" },
          { text: "Gets slow over time", next: "q4" }
        ]
      },
      q2: {
        q: "Is CPU or RAM usage very high in Task Manager at startup?",
        detail: "Open Task Manager (Ctrl+Shift+Esc) → Performance tab. Look for sustained 90%+ CPU or 90%+ RAM.",
        answers: [
          { text: "Yes — CPU or RAM maxed out", next: "q3" },
          { text: "No — usage looks normal", next: "r_disk_slow" }
        ]
      },
      q3: {
        q: "Does Task Manager show a specific process consuming most resources?",
        detail: "Sort by CPU% or Memory% in the Processes tab to find the culprit.",
        answers: [
          { text: "Yes — a specific process is the cause", next: "r_bad_process" },
          { text: "No — many small processes adding up", next: "r_startup_items" }
        ]
      },
      q4: {
        q: "Does the system slow down under load (gaming, video, big files)?",
        detail: "Thermal throttling causes slowdown under sustained load when a CPU overheats.",
        answers: [
          { text: "Yes — slows under heavy use", next: "r_thermal" },
          { text: "No — slows even when idle", next: "r_memory_leak" }
        ]
      },
      r_disk_slow: {
        type: "fix",
        title: "Slow HDD / Disk Issue",
        steps: [
          "Open Task Manager → Performance → Disk. Check for 100% disk usage",
          "Run Check Disk: open CMD as Admin → chkdsk /f /r C:",
          "Check if drive is nearly full (keep 15%+ free)",
          "If HDD (not SSD): defragment via 'Optimize Drives'",
          "Consider SSD upgrade if drive is old HDD"
        ],
        cmds: ["chkdsk /f /r C:", "winsat disk"]
      },
      r_bad_process: {
        type: "fix",
        title: "Rogue Process / Malware",
        steps: [
          "Note the process name from Task Manager",
          "Search the process name online to verify legitimacy",
          "If unknown/suspicious: run Windows Defender full scan",
          "Run Malwarebytes (free version) as a second opinion",
          "If confirmed malware: follow malware removal procedure"
        ],
        cmds: ["msconfig", "sfc /scannow"]
      },
      r_startup_items: {
        type: "fix",
        title: "Too Many Startup Programs",
        steps: [
          "Open Task Manager → Startup tab",
          "Disable all non-essential startup items (right-click → Disable)",
          "Key safe ones to keep: antivirus, audio/GPU drivers",
          "Restart and re-test performance",
          "Use 'msconfig' for additional startup/service control"
        ],
        cmds: ["taskmgr", "msconfig"]
      },
      r_thermal: {
        type: "fix",
        title: "Thermal Throttling",
        steps: [
          "Check CPU temps with HWMonitor or Core Temp (safe range: <85°C)",
          "Shut down and clean dust from vents and fans with compressed air",
          "Check that all fans are spinning",
          "If laptop: use on a hard flat surface, not on fabric",
          "If temps still high: thermal paste replacement may be needed — escalate"
        ]
      },
      r_memory_leak: {
        type: "fix",
        title: "Possible Memory Leak / RAM Issue",
        steps: [
          "Open Resource Monitor → Memory tab, watch for climbing 'In Use' over time",
          "Identify which process grows in memory without releasing",
          "Restart that specific process/application as a workaround",
          "Run Windows Memory Diagnostic: search 'mdsched' and schedule scan",
          "If RAM tests fail: escalate for hardware replacement"
        ],
        cmds: ["mdsched.exe", "resmon"]
      }
    }
  },

  printer: {
    label: "🖨️ Printer Issues",
    start: "q1",
    nodes: {
      q1: {
        q: "Is the printer powered on and showing a Ready state?",
        detail: "Check the printer's display panel or status lights. Power or error indicators need to be resolved before anything else.",
        answers: [
          { text: "Yes — shows Ready", next: "q2" },
          { text: "No — error, offline, or no power", next: "r_power" }
        ]
      },
      q2: {
        q: "Does the printer show as Online in Windows?",
        detail: "Go to Settings → Printers & Scanners → click the printer. If it says 'Offline', that's the issue.",
        answers: [
          { text: "Yes — shows as Online", next: "q3" },
          { text: "No — shows Offline", next: "r_offline" }
        ]
      },
      q3: {
        q: "Are there stuck jobs in the print queue?",
        detail: "Open the printer → see if old jobs are stuck in the queue, especially ones showing as Deleting or Error.",
        answers: [
          { text: "Yes — stuck jobs in queue", next: "r_stuck_queue" },
          { text: "No — queue is empty", next: "q4" }
        ]
      },
      q4: {
        q: "Is the printer connected via network or USB?",
        answers: [
          { text: "Network / Wi-Fi printer", next: "r_network_printer" },
          { text: "USB directly to PC", next: "r_usb_printer" }
        ]
      },
      r_power: {
        type: "fix",
        title: "Printer Power / Hardware Error",
        steps: [
          "Check power cable is firmly seated at both printer and wall",
          "Power cycle the printer: hold power off 30 seconds, back on",

  server: {

      },

          { text: "Credentials not accepted / wrong password", next: "q3" },
          { text: "Cannot connect — connection refused or timed out", next: "q_rdp_connect" },

      r_rdp_permission: {

        steps: [
          "On the server: open System Properties → Remote tab",
          "Click 'Select Users' under Remote Desktop",
          "Add the user or their group (e.g. Domain Users, RDP Users)",
          "Alternatively in AD: add user to the 'Remote Desktop Users' group",
          "Confirm Remote Desktop is enabled on the server",
          "Have user retry login"
        ],
        cmds: ["sysdm.cpl", "lusrmgr.msc"]
      },
      r_rdp_cert: {
        type: "fix",
        title: "RDP Certificate Warning",
        steps: [
          "If internal server: click 'Connect anyway' — self-signed certs are common internally",
          "To permanently trust: export the cert and import into Trusted Root Authorities",
          "If external server: verify you're connecting to the correct IP (not a MITM risk)",
          "Check the certificate's CN matches the server hostname",
          "For production servers: install a proper trusted SSL certificate"
        ]
      },
      r_rdp_domain_creds: {
        type: "fix",
        title: "RDP Domain Credential Failure",

          "Check domain controller is reachable from the server",

        cmds: ["dsa.msc", "eventvwr.msc", "nltest /dsgetdc:[domain]"]

      r_rdp_local_creds: {

        steps: [
          "Use format: .\\username or SERVERNAME\\username to specify local account",
          "Confirm the local account exists: open lusrmgr.msc on the server",
          "Reset password if needed: net user [username] [newpassword] (admin CMD on server)",
          "Verify account is not disabled or expired in Local Users & Groups",
          "Confirm local account is in the Remote Desktop Users group"
        ],
        cmds: ["lusrmgr.msc", "net user [username] [newpassword]"]
      },
      r_rdp_firewall: {
        type: "fix",
        title: "RDP Port Blocked by Firewall",
        steps: [
          "RDP uses TCP port 3389 by default — verify it's open",
          "On the server: check Windows Firewall allows RDP inbound",
          "Run: netstat -an | findstr 3389 to confirm RDP is listening",
          "Check network firewall / security group rules (especially in cloud environments)",
          "If port was changed: find the custom port in registry: HKLM\\System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-TCP\\PortNumber",
          "Test with: Test-NetConnection -ComputerName [IP] -Port 3389 in PowerShell"
        ],
        cmds: ["netstat -an | findstr 3389", "Test-NetConnection -ComputerName [IP] -Port 3389"]

      r_server_unreachable: {
        type: "escalate",

      },

      // SSH branch
      q5: {
        q: "What is the SSH error or symptom?",
        answers: [
          { text: "Permission denied (publickey) or password", next: "q6" },
          { text: "Connection refused or timed out", next: "r_ssh_connect" },
          { text: "Host key verification failed", next: "r_ssh_hostkey" },
          { text: "Too many authentication failures", next: "r_ssh_auth_limit" }
        ]
      },
      q6: {
        q: "Is the server using password auth or SSH key authentication?",
        answers: [
          { text: "Password authentication", next: "r_ssh_password" },
          { text: "SSH key (public/private key pair)", next: "r_ssh_key" }
        ]
      },
      r_ssh_password: {
        type: "fix",
        title: "SSH Password Authentication Failure",
        steps: [
          "Confirm correct username — Linux is case-sensitive (root ≠ Root)",
          "Verify password is correct; reset via console if needed",
          "Check if PasswordAuthentication is enabled in /etc/ssh/sshd_config",
          "If disabled: set PasswordAuthentication yes, then: sudo systemctl restart sshd",
          "Check if the account is locked: sudo passwd -S [username]",
          "Unlock if needed: sudo passwd -u [username]",
          "Review /var/log/auth.log or /var/log/secure for specific error"
        ],
        cmds: ["sudo cat /etc/ssh/sshd_config | grep PasswordAuth", "sudo systemctl restart sshd", "sudo passwd -S [username]"]
      },
      r_ssh_key: {
        type: "fix",
        title: "SSH Key Authentication Failure",
        steps: [
          "Confirm you're using the correct private key: ssh -i /path/to/key user@host",
          "Check key permissions — private key must be chmod 600, not world-readable",
          "Verify the public key is in ~/.ssh/authorized_keys on the server",
          "Check ~/.ssh directory permissions: must be chmod 700",
          "Confirm the key algorithm is supported (ed25519 and RSA 4096 are safest)",
          "Run ssh with -vvv flag for verbose debug output to pinpoint the issue"
        ],
        cmds: ["chmod 600 ~/.ssh/id_rsa", "ssh -vvv -i /path/to/key user@host"]
      },
      r_ssh_connect: {
        type: "fix",
        title: "SSH Connection Refused / Timeout",
        steps: [
          "Confirm SSH service is running: sudo systemctl status sshd",
          "Check the port — default is 22, but may be customized in sshd_config",
          "Verify firewall allows SSH: sudo ufw status or sudo firewall-cmd --list-all",
          "For cloud VMs: check Security Group or NSG rules allow TCP 22 inbound",
          "Test connectivity: nc -zv [IP] 22 or Test-NetConnection in PowerShell",
          "If port 22 is blocked: check if an alternate port is configured"
        ],
        cmds: ["sudo systemctl status sshd", "sudo ufw status", "nc -zv [IP] 22"]
      },
      r_ssh_hostkey: {
        type: "fix",
        title: "SSH Host Key Verification Failed",
        steps: [
          "This occurs when the server's host key changed (OS reinstall, IP reuse, etc.)",
          "If expected (e.g. you rebuilt the server): remove the old key",
          "Run: ssh-keygen -R [hostname or IP]",
          "Then reconnect — you'll be prompted to accept the new key",
          "If unexpected: investigate — could indicate a MITM or DNS spoofing attack",
          "Verify the server's fingerprint out-of-band before accepting"

        cmds: ["ssh-keygen -R [hostname]"]
      },
      r_ssh_auth_limit: {
        type: "fix",
        title: "Too Many Authentication Failures",
        steps: [
          "SSH agent may be offering too many keys automatically",
          "Specify the key explicitly: ssh -i /path/to/key -o IdentitiesOnly=yes user@host",
          "Or temporarily clear the SSH agent: ssh-add -D",
          "Check MaxAuthTries in /etc/ssh/sshd_config (default is 6)",
          "If locked out: access via console and reset or raise MaxAuthTries temporarily"
        ],
        cmds: ["ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes user@host", "ssh-add -D"]
      },

          "Review web server error logs: /var/log/nginx/error.log or Event Viewer for IIS",

        cmds: ["sudo systemctl status nginx", "sudo systemctl restart apache2"]

      q_local: {

        steps: [
          "Confirm Caps Lock is off — passwords are case-sensitive",
          "Try the built-in Administrator account if domain is unavailable",
          "If account is locked: boot from Windows Server installation media",
          "Use recovery console to reset Administrator password if needed",
          "Check if the server is in Safe Mode (F8 on boot) — may limit available accounts",
          "Review Event ID 4625 in Security logs for the exact failure reason"
        ],
        cmds: ["eventvwr.msc", "net user Administrator [newpassword]"]
      },

          "If password unknown: reboot into recovery/single-user mode",
          "At GRUB menu: press 'e', add 'single' or 'init=/bin/bash' to kernel line",
          "In single-user shell: run passwd [username] to reset",
          "Check if account is locked: passwd -S [username] (look for 'L' status)",
          "Unlock with: passwd -u [username] or usermod -U [username]"
        ],
        cmds: ["passwd [username]", "passwd -S [username]", "usermod -U [username]"]
      }

// state
let currentTree = null;
let currentNode = null;
let history = [];
let trailSteps = [];

function getNode() {
  return trees[currentTree].nodes[currentNode];
}

// breadcrumb bar above each card
function buildTrail() {
  if (!trailSteps.length) return '';
  const label = trees[currentTree].label.slice(trees[currentTree].label.indexOf(' ') + 1);
  const items = trailSteps.map(t => {
    const short = t.length > 30 ? t.slice(0, 30) + '\u2026' : t;
    return `<span class="trail-item">${short}</span>`;
  }).join('');
  return `<div class="trail"><span class="trail-item">${label}</span>${items}</div>`;
}

// nav buttons shown on every screen
function buildControls() {
  const backBtn = history.length ? `<button class="ctrl-btn back" onclick="goBack()">\u2190 Back</button>` : '';
  return `
    <div class="controls">
      <button class="ctrl-btn restart" onclick="restart()">\u21BA Start Over</button>
      ${backBtn}
      <button class="ctrl-btn back" onclick="goHome()">&#8962; All Issues</button>
      <button class="ctrl-btn ticket" onclick="openTicketModal()">&#127903; Submit Ticket</button>
    </div>`;
}

function render() {
  const app = el('app');

  // home screen
  if (!currentTree) {
    const categoryBtns = Object.entries(trees).map(([key, tree]) => {
      const icon = tree.label.split(' ')[0];
      const name = tree.label.slice(tree.label.indexOf(' ') + 1);
      return `<button class="cat-btn" onclick="startTree('${key}')">
        <span class="cat-icon">${icon}</span>
        <span>${name}</span>
      </button>`;
    }).join('');

    app.innerHTML = `
      <div class="home-label">// SELECT AN ISSUE</div>
      <div class="category-grid">${categoryBtns}</div>
      <div style="display:flex; justify-content:flex-end; margin-top:8px">
        <button class="ctrl-btn ticket" onclick="openTicketModal()" style="margin-left:0">&#127903; Submit Ticket</button>
      </div>`;
    return;
  }

  const node = getNode();

  // resolution screen
  if (currentNode && node.type) {
    const isEscalate = node.type === 'escalate';
    const badgeClass = isEscalate ? 'esc' : 'fix';
    const badgeText = isEscalate ? '\u26A0 Escalate' : '\u2713 Resolution Found';

    const stepItems = node.steps.map((step, i) =>
      `<li><span class="step-num">${i + 1}</span><span>${step}</span></li>`
    ).join('');

    const cmdBlock = node.cmds
      ? `<div class="cmd-block">${node.cmds.map(c => `<div class="cmd-line">${c}</div>`).join('')}</div>`
      : '';

    app.innerHTML = `
      ${buildTrail()}
      <div class="resolution ${isEscalate ? 'escalate' : 'success'}">
        <div class="res-badge ${badgeClass}">${badgeText}</div>
        <div class="res-title">${node.title}</div>
        <ul class="steps-list">${stepItems}</ul>
        ${cmdBlock}
        ${buildControls()}
      </div>`;
    return;
  }

  // question screen
  const answerBtns = node.answers.map(a => {
    const safeText = a.text.replace(/'/g, "\'");
    return `<button class="ans-btn" onclick="answer('${a.next}', '${safeText}')">
      <span>${a.text}</span>
      <span class="ans-arrow" style="margin-left:auto">\u2192</span>
    </button>`;
  }).join('');

  app.innerHTML = `
    ${buildTrail()}
    <div class="card">
      <div class="step-label">// DIAGNOSTIC STEP ${history.length + 1}</div>
      <div class="question">${node.q}</div>
      ${node.detail ? `<div class="detail">${node.detail}</div>` : ''}
      <div class="answers">${answerBtns}</div>
      ${buildControls()}
    </div>`;
}

  // map tree keys to readable category names
  const categoryMap = {
    internet: 'No Internet',
    slow: 'Slow Computer',
    printer: 'Printer Issues',
    email: 'Email Issues',
    server: 'Server Login',
    login: 'User Login',
    macos: 'macOS Issues'
  };

  el('modal-body').innerHTML = `
    <div class="field-row">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="t-name" placeholder="First Last" />
      </div>
      <div class="field">
        <label>User Email</label>
        <input type="email" id="t-email" placeholder="user@company.com" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">

          <option>User Login</option>

        </select>
      </div>
    </div>
    <div class="field">
      <label>Issue Summary</label>
      <input type="text" id="t-summary" placeholder="Brief description of the problem..." />
    </div>
    <div class="field">
      <label>Steps Already Tried</label>
      <textarea id="t-steps" placeholder="What has been attempted so far?"></textarea>
    </div>

      <button class="cancel-btn" onclick="closeTicketModal()">Cancel</button>
      <button class="submit-btn" onclick="submitTicket()">Submit Ticket</button>
    </div>`;

  // pre-fill category if we're already in a tree
  const catSelect = el('t-category');
  if (catSelect && currentTree && categoryMap[currentTree]) {
    catSelect.value = categoryMap[currentTree];
  }

  // pre-fill steps from the diagnostic trail
  const stepsField = el('t-steps');
  if (stepsField && trailSteps.length > 0) {
    stepsField.value = trailSteps.map((step, i) => `${i + 1}. ${step}`).join('\n');
  }

function submitTicket() {
  const name     = (el('t-name')?.value || '').trim();
  const email    = (el('t-email')?.value || '').trim();
  const category = el('t-category')?.value || 'Other';
  const priority = el('t-priority')?.value || 'Medium';
  const summary  = (el('t-summary')?.value || '').trim();
  const steps    = (el('t-steps')?.value || '').trim();

  if (!name || !summary) {
    const missing = [!name && 'Name', !summary && 'Issue Summary'].filter(Boolean);
    alert('Please fill in: ' + missing.join(', '));
    return;
  }

  const ticketId = 'TKT-' + Date.now().toString().slice(-6);
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  el('modal-body').innerHTML = `
    <div class="ticket-success">
      <div class="ticket-icon">\u2705</div>
      <div class="ticket-id">${ticketId}</div>
      <div class="ticket-msg">Ticket logged. A technician will follow up shortly.</div>
      <div class="ticket-summary-box">
        TICKET_ID: <span>${ticketId}</span><br>
        DATE:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span>${dateStr} ${timeStr}</span><br>
        NAME:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span>${name}</span><br>
        ${email ? 'EMAIL:&nbsp;&nbsp;&nbsp;&nbsp;<span>' + email + '</span><br>' : ''}
        CATEGORY:&nbsp;<span>${category}</span><br>
        PRIORITY:&nbsp;<span>${priority}</span><br>
        SUMMARY:&nbsp;&nbsp;<span>${summary}</span><br>
        ${steps ? 'TRIED:&nbsp;&nbsp;&nbsp;&nbsp;<span>' + steps.replace(/\n/g, ' | ') + '</span>' : ''}
      </div>
      <div class="modal-footer" style="justify-content:center">
        <button class="submit-btn" style="max-width:200px" onclick="closeTicketModal()">Done</button>
      </div>
    </div>`;
}

function closeTicketModal() {
  el('ticket-modal').style.display = 'none';
}

function closeModalOutside(e) {
  if (e.target.id === 'ticket-modal') closeTicketModal();
}

function startTree(key) {
  currentTree = key;
  currentNode = trees[key].start;
  history = [];
  trailSteps = [];
  render();
}

function answer(nextNode, label) {
  history.push({ node: currentNode, trail: [...trailSteps] });
  trailSteps.push(label);
  currentNode = nextNode;
  render();
}

function goBack() {
  const prev = history.pop();
  currentNode = prev.node;
  trailSteps = prev.trail;
  render();
}

function restart() {
  currentNode = trees[currentTree].start;
  history = [];
  trailSteps = [];
  render();
}

function goHome() {
  currentTree = null;
  currentNode = null;
  history = [];
  trailSteps = [];
  render();
}

render();

</script>
</body>
</html>
